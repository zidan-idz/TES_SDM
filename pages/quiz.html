<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TES SDM adalah platform sederhana untuk menguji tingkat SDM kamu, apakah kamu termasuk golongan SDM Rendah atau SDM Tinggi"
    />
    <meta name="keywords" content="tes, SDM, SDM Rendah, SDM Tinggi" />
    <meta name="author" content="Zidan IDz" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f8f9fa" />
    <meta
      property="og:title"
      content="TES SDM - Platform Uji Tingkat SDM Kamu"
    />
    <link
      rel="shortcut icon"
      href="/assets/img/mainIcon.png"
      type="image/x-icon"
    />
    <title>TES SDM</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/primary.css" />
    <link rel="stylesheet" href="/assets/css/secondary.css" />
    <link rel="stylesheet" href="/assets/css/custom.css" />
  </head>
  <body>
    <header class="bg-dark shadow">
      <nav
        class="container navbar px-3 d-flex justify-content-between align-items-center"
      >
        <div class="d-flex align-items-center gap-2">
          <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <img
              src="/assets/img/mainIcon.png"
              alt="Logo"
              width="30"
              height="auto"
            />
            <span class="text-white fs-4 fw-bold">TES SDM</span>
          </a>
        </div>
      </nav>
    </header>

    <main>
      <section class="container mt-1 pt-3 px-1 px-md-3 px-lg-5 mb-5 pb-5">
        <div class="bg-dark text-white rounded p-4 text-center">
          <div>
            <h4>TES SDM</h4>
            <p></p>
          </div>
          <div class="text-white fw-semibold" id="timer">Waktu: 00:00</div>
        </div>

        <div class="border border-1 border-dark rounded shadow-sm p-4">
          <div
            id="questionInfo"
            class="mb-3 fw-bold text-dark text-center"
          ></div>
          <div class="progress mb-2">
            <div
              id="progressBar"
              class="progress-bar bg-dark"
              style="width: 0%"
            >
              0%
            </div>
          </div>

          <div class="text-center my-3 mb-4">
            <p class="text-secondary">*Progress TES SDM</p>
          </div>

          <div id="quizContainer"></div>

          <div class="mt-3">
            <hr class="text-black" />

            <div class="d-flex justify-content-between mt-3">
              <button id="btnPrev" class="btn btn-secondary" disabled>
                Kembali
              </button>

              <button id="btnNext" class="btn btn-dark">Selanjutnya</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div id="timeout-modal" class="noticeOverlay">
        <div class="noticeContent">
          <div>
            <h4 class="fs-2 fw-bold my-3">Tes Selesai!</h4>

            <p id="timeout-message" class="fs-5 fw-normal my-3">
              Waktu untuk mengerjakan tes telah berakhir.
            </p>
          </div>

          <div>
            <button id="showResults" class="btn btn-dark">Lihat Hasil</button>
          </div>

          <div class="text-center mt-4">
            <small class="text-muted">
              &copy; 2024 TES SDM. All Rights Reserved.
            </small>
          </div>
        </div>
      </div>
    </footer>

    <script src="/assets/js/quizHandler.js"></script>
  </body>
</html>
